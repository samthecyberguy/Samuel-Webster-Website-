<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">Cybersecurity dashboard illustration</title>
  <desc id="desc">Dark terminal-inspired dashboard panels with network nodes, log lines, and security signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#071926"/>
      <stop offset="1" stop-color="#06100e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12243a"/>
      <stop offset="1" stop-color="#07131f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1100" height="720" rx="36" fill="url(#bg)"/>
  <g opacity="0.24" stroke="#2dd4bf" stroke-width="1">
    <path d="M0 86H1100M0 172H1100M0 258H1100M0 344H1100M0 430H1100M0 516H1100M0 602H1100"/>
    <path d="M92 0V720M184 0V720M276 0V720M368 0V720M460 0V720M552 0V720M644 0V720M736 0V720M828 0V720M920 0V720M1012 0V720"/>
  </g>
