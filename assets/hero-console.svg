      <text x="24" y="78" fill="#d7e3ea" font-family="Consolas, monospace" font-size="17">[cloud] honeypot baseline configured on EC2</text>
      <text x="24" y="112" fill="#d7e3ea" font-family="Consolas, monospace" font-size="17">[malware] dynamic and static review workflow</text>
      <text x="24" y="146" fill="#d7e3ea" font-family="Consolas, monospace" font-size="17">[helpdesk] account lockout simulation resolved</text>
      <rect x="638" y="38" width="150" height="90" rx="10" fill="#07131f" stroke="#1f8f82"/>
      <path d="M666 100l31-31 22 22 38-44" fill="none" stroke="#2dd4bf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
