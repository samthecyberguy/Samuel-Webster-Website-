      <text x="24" y="112" fill="#d7e3ea" font-family="Consolas, monospace" font-size="17">M365 auth review ........... OK</text>
      <text x="24" y="146" fill="#d7e3ea" font-family="Consolas, monospace" font-size="17">Endpoint triage ............ READY</text>
      <rect x="24" y="166" width="314" height="8" rx="4" fill="#13263a"/>
      <rect x="24" y="166" width="248" height="8" rx="4" fill="#2dd4bf" opacity="0.9"/>
